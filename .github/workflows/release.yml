name: Release
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    if: ${{ !contains(github.ref_name, '-beta.') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
      - name: Sanity check dist entrypoint
        run: test -f dist/simon42-dashboard-strategy.js
      - name: Create GitHub release with JS assets
        uses: softprops/action-gh-release@v3
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/*.js
            dist/*.js.LICENSE.txt
      - name: Validate for HACS
        uses: hacs/action@main
        with:
          category: plugin
