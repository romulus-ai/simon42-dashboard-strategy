name: Pre-Release

on:
  push:
    tags:
      - 'v*.*.*-beta.*'

permissions:
  contents: write

jobs:
  prerelease:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
      - name: Sanity check dist entrypoint
        run: test -f dist/simon42-dashboard-strategy.js
      - name: Create GitHub pre-release with JS assets
        uses: softprops/action-gh-release@v3
        with:
          draft: false
          prerelease: true
          generate_release_notes: true
          files: |
            dist/*.js
            dist/*.js.LICENSE.txt
